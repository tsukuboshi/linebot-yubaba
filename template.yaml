AWSTemplateFormatVersion: "2010-09-09"
Transform: "AWS::Serverless-2016-10-31"
Parameters:
  LineChannelAccessToken:
    Type: "String"
    Description: "Access token of LINE"
  LineChannelSecret:
    Type: "String"
    Description: "Channel secret of LINE"
Resources:
  EndPointFunction:
    Type: "AWS::Serverless::Function"
    Properties:
      Runtime: "python3.9"
      CodeUri: "src"
      Handler: "mylinebot.lambda_handler"
      Environment:
        Variables:
          LINE_CHANNEL_ACCESS_TOKEN:
            Ref: "LineChannelAccessToken"
          LINE_CHANNEL_SECRET:
            Ref: "LineChannelSecret"
      Policies:
        - RekognitionDetectOnlyPolicy: {}
      Events:
        API:
          Type: "Api"
          Properties:
            Path: "/api_endpoint"
            Method: "post"
Outputs:
  ApiEndpointURL:
    Description: "API Endpoint URL"
    Value:
      Fn::Sub: "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ServerlessRestApi.Stage}/api_endpoint"
